# Uncrustify config for Black Box (Vala)
# uncrustify --version => Uncrustify_d-0.82.0_f
#
# Style summary:
#   - K&R braces; else/catch/finally cuddled with the closing brace: `} else {`
#   - Space before parens on conditionals/constructors only (not calls/defs); no inner padding
#   - Always braces, even for single-statement bodies
#   - 2-space indentation, 80-column wrap, at most one blank line

# General
# -------
newlines                                 = lf
input_tab_size                           = 2
output_tab_size                          = 2
indent_columns                           = 2
indent_with_tabs                         = 0
indent_align_assign                      = false
code_width                               = 80

# Braces
# ------
# K&R: opening brace stays on the same line as the statement/declaration.
# else/catch/finally are cuddled with the preceding closing brace, and their
# own opening brace stays on the same line as the keyword: `} else {`.
#
# NOTE: `nl_if_brace`, `nl_elseif_brace`, `nl_else_brace`, `nl_catch_brace`
# and `nl_finally_brace` are deliberately NOT set to `remove` here — doing so
# triggers an uncrustify quirk that inserts extra spaces before the brace
# (`} else if (x)   {`, `void foo ()  {`). Since the codebase is already 100%
# K&R/cuddled, leaving them at `ignore` preserves the correct layout without
# the bug; it just won't auto-convert braces that someone writes Allman-style.
nl_brace_else                            = remove
nl_else_if                               = remove
nl_for_brace                             = remove
nl_while_brace                           = remove
nl_do_brace                              = remove
nl_switch_brace                          = remove
nl_try_brace                             = remove
nl_brace_catch                           = remove
nl_brace_finally                         = remove
nl_class_brace                           = remove
nl_enum_brace                            = remove
nl_struct_brace                          = remove
nl_fdef_brace                            = remove
nl_fcall_brace                           = remove
# NOTE: must be `ignore`, not `remove` — the Vala parser treats enum bodies as
# structs, so `remove` incorrectly glues the token after an enum's closing `}`
# onto the same line (e.g. joins a method or class decl to the enum body).
nl_brace_struct_var                      = ignore

# Always wrap single-statement bodies in braces. Note: when uncrustify adds
# braces to a pre-existing one-liner, it keeps it on one line, e.g.
# `if (x == null) { return; }` rather than expanding to multiple lines — this
# only affects legacy brace-less one-liners already in the source.
mod_full_brace_if                        = add
mod_full_brace_for                       = add
mod_full_brace_while                     = add
mod_full_brace_do                        = add

# Collapse empty bodies to `{}` rather than `{\n}`.
nl_collapse_empty_body                   = true

# Multi-line function declarations
# --------------------------------
# Once a signature already spans multiple lines, put one parameter per line
# with the closing paren on its own line:
#   private void my_callback (
#     int x,
#     int y
#   ) {
# Deliberately NOT applied to function *calls* (`nl_func_call_*_multi_line`):
# calls very often carry trailing closures/lambdas (signal handlers, async
# callbacks), and forcing one-arg-per-line there mangles the closure body.
nl_func_def_start_multi_line             = true
nl_func_def_args_multi_line              = true
nl_func_def_end_multi_line               = true
nl_func_decl_start_multi_line            = true
nl_func_decl_args_multi_line             = true
nl_func_decl_end_multi_line              = true

# Closing paren of a multi-line signature indents to the level of the
# statement that opened it (lines up with the brace that follows).
indent_paren_close                       = 2

# Spacing
# -------
# GNOME/Vala style: a space before the opening paren only on conditionals
# (if/switch/for/foreach/while/...) and constructors/destructors, e.g.
# `if (x > 0)`, `public MyClass ()`. NOT on calls, defs, or prototypes, e.g.
# `my_func ();` → `my_func();`, `void my_func ()` → `void my_func()`.
#
# NOTE: uncrustify has no per-keyword control over `sp_before_sparen` — it's
# a single switch covering if/for/while/switch/foreach/etc. as a group.
sp_before_sparen                         = add
sp_after_sparen                          = add
sp_sparen_brace                          = add

sp_func_call_paren                       = remove
sp_func_call_paren_empty                 = remove
sp_func_def_paren                        = remove
sp_func_def_paren_empty                  = remove
sp_func_proto_paren                      = remove
sp_func_proto_paren_empty                = remove
sp_func_class_paren                      = add
sp_func_class_paren_empty                = add
sp_fparen_brace                          = add
sp_getset_brace                          = force

# No padding just inside parens / brackets; force a single space inside braces.
sp_inside_fparen                         = remove
sp_inside_fparens                        = remove
sp_inside_sparen                         = remove
sp_inside_paren                          = remove
sp_inside_square                         = remove
sp_inside_braces                         = force
sp_inside_braces_empty                   = remove
sp_paren_paren                           = remove

sp_before_comma                          = remove
sp_after_comma                           = add
sp_after_semi                            = add
sp_before_semi                           = remove
sp_before_semi_for                       = remove
sp_before_semi_for_empty                 = remove

sp_assign                                = add
sp_arith                                 = add
sp_bool                                  = add
sp_compare                               = add
sp_not                                   = remove
sp_inv                                   = remove
sp_addr                                  = remove
sp_member                                = remove
sp_deref                                 = remove
sp_sign                                  = remove
sp_incdec                                = remove

# `Type* name` — pointer star attaches to the type, not the variable.
sp_before_ptr_star                       = remove
sp_after_ptr_star                        = force
sp_between_ptr_star                      = remove

# `(int) value`, `(owned) widget` — space after a cast.
sp_after_cast                            = add

# Ternary (`cond ? a : b`) / null-coalescing (`a ?? b`) spacing is
# deliberately left at its default (`ignore`): uncrustify's Vala tokenizer
# doesn't reliably distinguish the ternary `?` from the null-safe member
# access operator `?.` (e.g. `widget?.show ()`); forcing `sp_cond_question`
# turns `?.` into `? .`. `??` is already spaced correctly via `sp_arith`.
# Existing ternaries already follow the `a ? b : c` convention, so this is
# preserved rather than enforced.

sp_template_angle                        = remove
sp_before_angle                          = remove
sp_after_angle                           = remove
sp_inside_angle                          = remove

sp_before_square                         = remove
sp_before_squares                        = remove

sp_return_paren                          = add
sp_throw_paren                           = add

sp_else_brace                            = add
sp_brace_else                            = add
sp_catch_brace                           = add
sp_brace_catch                           = add
sp_finally_brace                         = add
sp_brace_finally                         = add
sp_try_brace                             = add

# When a boolean expression is already wrapped across lines, keep `&&` / `||`
# trailing the line (matches the existing convention), e.g.:
#   if (
#     a >= 0 &&
#     !b
#   ) {
pos_bool                                 = trail

# Blank lines
# -----------
# nl_max = 2 means at most 2 consecutive newlines, i.e. a single blank line.
nl_max                                   = 2
nl_after_func_body                       = 2
nl_after_func_body_class                 = 2
nl_before_class                          = 1
eat_blanks_before_close_brace            = true
eat_blanks_after_open_brace              = true

# Switch / case
# -------------
indent_switch_case                       = 2

# Code alignment
# --------------
align_with_tabs                          = false
align_keep_tabs                          = false

# Align consecutive variable definitions (local variables in functions).
align_var_def_span                       = 1
align_var_def_thresh                     = 4

# Align consecutive class/struct member definitions (properties and fields).
align_var_class_span                     = 1
align_var_class_thresh                   = 4

# Misc
# ----
indent_namespace                         = true
indent_class                             = true
indent_braces                            = false
